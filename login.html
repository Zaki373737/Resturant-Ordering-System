<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Owner Login - Brewed Awakening</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-surface-variant": "#4e453f",
                        "surface-container": "#fdebdc",
                        "surface-container-low": "#fff1e7",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-high": "#f7e5d7",
                        "on-surface": "#231a11",
                        "outline-variant": "#d2c4bd",
                        "background": "#fff8f4",
                        "primary": "#100602",
                        "primary-container": "#2b1d14",
                        "on-primary-container": "#998377",
                        "secondary": "#735a3e",
                        "secondary-container": "#fdd9b7",
                        "on-secondary-container": "#785e42",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a",
                        "brand-gold": "#D4AF37"
                    },
                    borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" },
                    fontFamily: {
                        "display-lg": ["Playfair Display"],
                        "headline-sm": ["Playfair Display"],
                        "headline-lg": ["Playfair Display"],
                        "label-lg": ["Montserrat"],
                        "label-sm": ["Montserrat"],
                        "body-md": ["Montserrat"],
                        "body-sm": ["Montserrat"]
                    },
                    fontSize: {
                        "headline-lg": ["40px", { lineHeight: "1.2", fontWeight: "700" }],
                        "headline-sm": ["24px", { lineHeight: "1.4", fontWeight: "600" }],
                        "label-lg": ["14px", { lineHeight: "1", letterSpacing: "0.05em", fontWeight: "600" }],
                        "label-sm": ["12px", { lineHeight: "1", letterSpacing: "0.03em", fontWeight: "500" }],
                        "body-md": ["16px", { lineHeight: "1.6", fontWeight: "400" }],
                        "body-sm": ["14px", { lineHeight: "1.5", fontWeight: "400" }]
                    }
                }
            }
        }
    </script>
    <!-- Shared Styles -->
    <link rel="stylesheet" href="styles.css"/>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">

<main class="flex-grow flex items-center justify-center px-margin-mobile py-12">
    <div class="w-full max-w-md">
        <!-- Brand -->
        <div class="text-center mb-8">
            <a href="menu.html" class="inline-flex items-center gap-2 no-underline">
                <span class="material-symbols-outlined text-brand-gold text-4xl">local_cafe</span>
            </a>
            <h1 class="font-display-lg text-headline-lg text-primary mt-4">Brewed Awakening</h1>
            <p class="font-body-md text-on-surface-variant mt-1">Owner Dashboard Login</p>
        </div>

        <!-- Login Card -->
        <div class="bg-surface-container-lowest rounded-[24px] p-8 soft-shadow">
            <form id="login-form" class="space-y-5" onsubmit="handleLogin(event)">
                <div class="flex flex-col gap-1.5">
                    <label for="email" class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest ml-1">Email</label>
                    <input id="email" name="email" type="email" required autocomplete="username"
                           class="w-full bg-surface-container-low border border-outline-variant/30 rounded-[16px] px-4 py-3 focus:ring-1 focus:ring-brand-gold focus:border-brand-gold transition-all font-body-md"
                           placeholder="owner@brewedawakening.com"/>
                </div>
                <div class="flex flex-col gap-1.5">
                    <label for="password" class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest ml-1">Password</label>
                    <input id="password" name="password" type="password" required autocomplete="current-password"
                           class="w-full bg-surface-container-low border border-outline-variant/30 rounded-[16px] px-4 py-3 focus:ring-1 focus:ring-brand-gold focus:border-brand-gold transition-all font-body-md"
                           placeholder="••••••••"/>
                </div>

                <button id="login-btn" type="submit"
                        class="w-full bg-primary-container text-white py-4 rounded-[16px] font-label-lg text-label-lg font-bold flex items-center justify-center gap-2 transition-all duration-300 hover:bg-primary active:scale-[0.98] soft-shadow">
                    <span id="login-btn-label">Log In</span>
                    <span class="material-symbols-outlined">login</span>
                </button>

                <p id="login-error" class="hidden rounded-[16px] px-4 py-3 text-sm font-semibold text-center bg-error-container text-on-error-container"></p>
            </form>
        </div>

        <p class="text-center text-label-sm text-on-surface-variant/60 mt-6">
            <a href="menu.html" class="underline hover:text-primary">← Back to the café</a>
        </p>
    </div>
</main>

<script>
    // If already logged in, skip straight to the dashboard.
    document.addEventListener('DOMContentLoaded', async () => {
        if (!supabaseClient) return;
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            window.location.href = 'dashboard.html';
        }
    });

    async function handleLogin(event) {
        event.preventDefault();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const errorBox = document.getElementById('login-error');
        const button = document.getElementById('login-btn');
        const buttonLabel = document.getElementById('login-btn-label');

        errorBox.classList.add('hidden');

        if (!supabaseClient) {
            errorBox.textContent = 'Supabase client is unavailable. Check your connection.';
            errorBox.classList.remove('hidden');
            return;
        }

        button.disabled = true;
        button.classList.add('opacity-70', 'cursor-not-allowed');
        buttonLabel.textContent = 'Logging in…';

        try {
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                throw error;
            }

            // Success — go to the owner dashboard.
            window.location.href = 'dashboard.html';
        } catch (error) {
            console.error('Login failed:', error);
            errorBox.textContent = error?.message || 'Could not log in. Please check your email and password.';
            errorBox.classList.remove('hidden');

            button.disabled = false;
            button.classList.remove('opacity-70', 'cursor-not-allowed');
            buttonLabel.textContent = 'Log In';
        }
    }
</script>
</body>
</html>
